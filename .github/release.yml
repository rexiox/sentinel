changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Performance
      labels:
        - perf
        - test
    - title: Documentation
      labels:
        - documentation
    - title: "All Changes"
      labels:
        - "*"